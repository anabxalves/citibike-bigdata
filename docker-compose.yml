services:
  jupyter:
    build: .
    container_name: citibike-bigdata
    ports:
      - "8888:8888"   # Jupyter Lab
      - "4040:4040"   # Spark UI (jobs em execução)
      - "4041:4041"   # Spark UI (segundo job, se houver)
    volumes:
      - ./:/home/jovyan/work
      - ivy-cache:/home/jovyan/.ivy2
      - maven-cache:/home/jovyan/.m2
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - JUPYTER_TOKEN=
      - SPARK_DRIVER_MEMORY=4g
    restart: unless-stopped

volumes:
  ivy-cache:
  maven-cache:
